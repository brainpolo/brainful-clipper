<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clip history - brainful</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-50 dark:bg-zinc-950 text-gray-900 dark:text-gray-100">

<div class="max-w-2xl mx-auto px-6 py-10">
  <header class="mb-8 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-xl bg-brand-500 flex items-center justify-center shadow-sm">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight">clip history</h1>
        <p id="clipCount" class="text-xs text-gray-500 dark:text-gray-400"></p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <input type="text" id="searchInput" placeholder="search clips..." class="h-8 w-48 px-3 bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 rounded-lg text-xs outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-500/20 transition-all placeholder:text-gray-400">
    </div>
  </header>

  <main id="historyList" class="flex flex-col gap-3"></main>

  <div id="emptyState" class="text-center py-20 hidden">
    <div class="w-16 h-16 mx-auto mb-5 rounded-2xl bg-gray-100 dark:bg-zinc-800 flex items-center justify-center">
      <svg class="w-8 h-8 text-gray-300 dark:text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75"/>
      </svg>
    </div>
    <p class="text-base font-semibold text-gray-700 dark:text-gray-200 mb-1">no clips yet</p>
    <p class="text-sm text-gray-400 dark:text-gray-500">clip a YouTube video or upload a file to get started</p>
  </div>
</div>

<script src="./main.ts" type="module"></script>

</body>
</html>
