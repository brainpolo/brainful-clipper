<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-white dark:bg-zinc-950 text-gray-900 dark:text-gray-100">

<div class="w-[280px] max-h-[400px] overflow-hidden text-xs flex flex-col">

  <!-- Auth View -->
  <div id="authView" class="view hidden px-4 py-5 overflow-y-auto">
    <div class="text-center mb-4">
      <div class="flex items-center justify-between mb-1">
        <h1 class="text-sm font-bold tracking-tight">brainful <span class="font-normal italic text-brand-500">clipper</span></h1>
        <button id="openAppAuth" class="open-app-btn flex items-center gap-1 px-2.5 h-6 rounded-full bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 text-[10px] font-medium hover:bg-brand-100 dark:hover:bg-brand-500/20 transition-colors cursor-pointer">
          open app
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
        </button>
      </div>
      <p class="text-[11px] text-gray-500 dark:text-gray-400">clip videos and files to your account</p>
    </div>
    <button id="loginBtn" class="w-full h-8 bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white rounded-lg text-xs font-semibold cursor-pointer transition-all duration-150 shadow-sm hover:shadow-md active:scale-[0.98]">sign in to brainful</button>
  </div>

  <!-- Main Content -->
  <div id="mainContent" class="hidden flex-1 flex flex-col overflow-hidden">

    <!-- Tab Bar (sticky) -->
    <div id="tabBar" class="flex items-center px-2.5 py-1.5 gap-1 border-b border-gray-200 dark:border-zinc-800 shrink-0">
      <button id="tabNote" class="tab-btn tab-btn-active">note</button>
      <button id="tabClip" class="tab-btn">clip</button>
      <button id="tabHistory" class="tab-btn">history <span id="historyCount" class="text-gray-400"></span></button>
      <div class="flex-1"></div>
      <button id="openAppTab" class="open-app-btn w-6 h-6 rounded-full bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 hover:bg-brand-100 dark:hover:bg-brand-500/20 transition-colors cursor-pointer flex items-center justify-center shrink-0" title="open app" aria-label="open app">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
      </button>
    </div>

    <!-- Scrollable content area -->
    <div class="flex-1 overflow-y-auto flex flex-col">

    <!-- Tab: Clip -->
    <div id="tabContentClip" class="hidden">

      <!-- Not Supported View (non-YouTube) -->
      <div id="notSupportedView" class="view hidden px-3 py-3">
        <div id="dropZone" class="group aspect-square border-2 border-dashed border-gray-200 dark:border-zinc-700 rounded-xl px-3 text-center cursor-pointer transition-all duration-200 hover:border-brand-300 hover:bg-brand-50/50 dark:hover:border-brand-500/40 dark:hover:bg-brand-500/5 flex flex-col items-center justify-center">
          <input type="file" id="fileInput" class="hidden" multiple>
          <div class="mb-2 w-8 h-8 rounded-full bg-gray-100 dark:bg-zinc-800 flex items-center justify-center group-hover:bg-brand-100 dark:group-hover:bg-brand-500/20 transition-colors">
            <svg class="w-4 h-4 text-gray-400 group-hover:text-brand-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
          </div>
          <p class="text-[11px] text-gray-500 dark:text-gray-400 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">drop files or click to upload</p>
        </div>
        <p class="text-[10px] text-gray-400 mt-2 text-center">or open a YouTube video to clip</p>
        <div id="uploadProgress" class="mt-2 hidden"></div>
      </div>

      <!-- Existing Clip View -->
      <div id="existingClipView" class="view hidden px-3 py-3">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-6 h-6 rounded-lg bg-green-500/10 flex items-center justify-center shrink-0">
            <svg class="w-3.5 h-3.5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="font-semibold text-sm tracking-tight">already clipped</span>
        </div>
        <div id="existingClipContent"></div>
      </div>

      <!-- Clip View (YouTube) -->
      <div id="clipView" class="view hidden px-3 py-3">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-6 h-6 rounded-lg bg-red-500/10 flex items-center justify-center shrink-0">
            <svg class="w-3.5 h-3.5 text-red-500" viewBox="0 0 24 24" fill="currentColor">
              <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/>
              <path d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="white"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <span class="font-semibold text-sm tracking-tight">clip video</span>
            <div id="videoTitle" class="text-[11px] text-gray-500 dark:text-gray-400 line-clamp-1"></div>
          </div>
        </div>
        <button id="clipBtn" class="w-full h-8 bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white rounded-lg text-xs font-semibold cursor-pointer transition-all duration-150 shadow-sm hover:shadow-md active:scale-[0.98]">clip</button>
        <div id="progressBar" class="h-1.5 mt-2 bg-gray-100 dark:bg-zinc-800 rounded-full overflow-hidden hidden">
          <div class="progress-bar-fill h-full w-0 bg-gradient-to-r from-brand-400 to-brand-600 rounded-full"></div>
        </div>
        <div class="relative my-3">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200 dark:border-zinc-800"></div></div>
          <div class="relative flex justify-center"><span class="bg-white dark:bg-zinc-950 px-2 text-[10px] text-gray-400">or</span></div>
        </div>
        <div id="clipDropZone" class="group aspect-square border-2 border-dashed border-gray-200 dark:border-zinc-700 rounded-xl px-3 text-center cursor-pointer transition-all duration-200 hover:border-brand-300 hover:bg-brand-50/50 dark:hover:border-brand-500/40 dark:hover:bg-brand-500/5 flex flex-col items-center justify-center">
          <input type="file" id="clipFileInput" class="hidden" multiple>
          <div class="mb-2 w-8 h-8 rounded-full bg-gray-100 dark:bg-zinc-800 flex items-center justify-center group-hover:bg-brand-100 dark:group-hover:bg-brand-500/20 transition-colors">
            <svg class="w-4 h-4 text-gray-400 group-hover:text-brand-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
          </div>
          <p class="text-[11px] text-gray-500 dark:text-gray-400 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">drop files or click to upload</p>
        </div>
        <div id="clipUploadProgress" class="mt-2 hidden"></div>
      </div>

      <!-- Success View -->
      <div id="successView" class="view hidden px-3 py-3">
        <div id="successAnimation" class="text-center py-4">
          <svg class="w-10 h-10 mx-auto" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" stroke="#10b981" stroke-width="2"/>
            <path class="checkmark-check" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
          </svg>
          <p class="text-xs font-semibold mt-2 text-gray-700 dark:text-gray-200">clipped</p>
        </div>
        <div id="entitySection" class="hidden">
          <label class="text-[10px] font-medium text-gray-500 dark:text-gray-400 mb-1 block">add tags</label>
          <div class="flex gap-1.5">
            <input type="text" id="entityInput" class="flex-1 h-7 px-2.5 bg-gray-50 dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 rounded-lg text-[11px] outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-500/20 transition-all placeholder:text-gray-400" placeholder="tag1, tag2, tag3">
            <button id="entitySubmit" class="h-7 px-3 bg-brand-500 hover:bg-brand-600 text-white rounded-lg text-[11px] font-medium transition-colors">add</button>
          </div>
          <div class="flex items-center justify-end gap-1.5 mt-1.5">
            <span class="text-[10px] text-gray-400" id="countdownLabel">auto-close</span>
            <div class="relative w-5 h-5">
              <svg class="w-5 h-5 -rotate-90" viewBox="0 0 20 20">
                <circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" class="text-gray-200 dark:text-zinc-700" stroke-width="2"/>
                <circle id="countdownRing" cx="10" cy="10" r="8" fill="none" stroke="currentColor" class="text-brand-500" stroke-width="2" stroke-dasharray="50.27" stroke-dashoffset="0" stroke-linecap="round" style="transition: stroke-dashoffset 1s linear"/>
              </svg>
              <span id="countdown" class="absolute inset-0 flex items-center justify-center text-[8px] font-semibold text-gray-500 dark:text-gray-400">5</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Tab: History -->
    <div id="tabContentHistory" class="hidden">
      <div class="sticky top-0 z-10 flex items-center gap-2 px-3 py-2 bg-white dark:bg-zinc-950 border-b border-gray-100 dark:border-zinc-800/50">
        <input type="text" id="historySearch" class="flex-1 h-6 px-2.5 bg-gray-50 dark:bg-zinc-800/80 border border-gray-200 dark:border-zinc-700 rounded-full text-[10px] outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-500/15 transition-all placeholder:text-gray-400" placeholder="search clips">
        <button id="clearHistoryBtn" class="text-[10px] px-2.5 h-6 rounded-full bg-gray-100 dark:bg-zinc-800 text-gray-500 dark:text-gray-400 hover:bg-red-50 hover:text-red-500 dark:hover:bg-red-500/10 dark:hover:text-red-400 hidden shrink-0 transition-colors cursor-pointer font-medium">clear</button>
      </div>
      <div id="historyList" class="flex flex-col gap-2 px-2 pb-2 pt-2"></div>
      <div id="historyEmpty" class="px-3 py-8 text-center hidden">
        <div class="mx-auto mb-2 w-8 h-8 rounded-full bg-gray-100 dark:bg-zinc-800 flex items-center justify-center">
          <svg class="w-4 h-4 text-gray-300 dark:text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </svg>
        </div>
        <p class="text-[10px] text-gray-400 dark:text-gray-500">no clips yet</p>
      </div>
    </div>

    <!-- Tab: Note -->
    <div id="tabContentNote" class="flex-1 flex flex-col p-2 pb-1.5 gap-1.5">
      <textarea id="noteTextarea"
        class="flex-1 p-3 bg-gray-50 dark:bg-zinc-900/80 border border-gray-200 dark:border-zinc-700/50 rounded-xl text-xs leading-relaxed text-gray-800 dark:text-gray-200 outline-none resize-none focus:border-brand-400 focus:ring-1 focus:ring-brand-500/20 transition-all placeholder:text-gray-400 dark:placeholder:text-gray-500"
        placeholder="jot something down..."></textarea>
      <div class="flex items-center gap-2">
        <button id="notePushBtn"
          class="flex-1 h-7 bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white rounded-full text-[11px] font-semibold cursor-pointer transition-all shadow-sm hover:shadow-md active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none"
          disabled>push to brainful</button>
        <span id="noteCharCount" class="text-[9px] text-gray-400 dark:text-gray-500 tabular-nums shrink-0 min-w-[2ch] text-right"></span>
      </div>
    </div>

    </div>
  </div>

  <div id="toast" class="toast hidden"><span id="toastMessage"></span></div>
</div>

<script src="./main.ts" type="module"></script>

</body>
</html>
