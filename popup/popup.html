<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300">

  <link rel="stylesheet" href="popup.css">

</head>
<body class="bg-white dark:bg-zinc-950 text-gray-900 dark:text-gray-100">

<div class="w-[280px] max-h-[320px] overflow-y-auto text-xs">

  <div id="authView" class="view hidden px-3 py-2">
    <div class="flex justify-between items-center mb-2">
      <span class="font-semibold text-sm">brainful</span>
    </div>
    <button id="loginBtn" class="w-full h-7 bg-blue-500 hover:bg-blue-600 text-white rounded text-xs font-medium cursor-pointer">login</button>
  </div>

  <div id="mainContent" class="hidden">

    <div id="notSupportedView" class="view hidden px-3 py-2">
      <div class="mb-1">
        <span class="font-semibold text-sm">brainful</span>
      </div>
      <p class="text-[10px] text-gray-500">open a YouTube video to clip</p>
    </div>

    <div id="existingClipView" class="view hidden px-3 py-2">
      <div class="flex justify-between items-center mb-1">
        <span class="font-semibold text-sm">already clipped</span>
      </div>
      <div id="existingClipContent"></div>
    </div>

    <div id="clipView" class="view hidden px-3 py-2">
      <div class="flex justify-between items-center mb-1">
        <span class="font-semibold text-sm">brainful</span>
      </div>
      <div id="videoTitle" class="text-[10px] text-gray-600 dark:text-gray-300 line-clamp-1 mb-2"></div>
      <button id="clipBtn" class="w-full h-7 bg-blue-500 hover:bg-blue-600 text-white rounded text-xs font-medium cursor-pointer">clip</button>
      <div id="progressBar" class="h-0.5 mt-1 bg-gray-200 dark:bg-gray-700 rounded overflow-hidden hidden">
        <div class="progress-bar-fill h-full w-0 bg-blue-500"></div>
      </div>
    </div>

    <div id="successView" class="view hidden px-3 py-2">
      <div id="successAnimation" class="text-center py-2">
        <span class="text-green-500 text-lg">✓</span>
        <p class="text-xs font-medium">clipped</p>
      </div>
      <div id="entitySection" class="hidden">
        <div class="flex gap-1">
          <input type="text" id="entityInput" class="flex-1 h-6 px-2 bg-gray-100 dark:bg-gray-800 rounded text-[10px] outline-none" placeholder="add tags...">
          <button id="entitySubmit" class="h-6 px-2 bg-blue-500 text-white rounded text-[10px] font-medium">add</button>
        </div>
        <div class="text-right text-[9px] text-gray-400 mt-0.5"><span id="countdown">5s</span></div>
      </div>
    </div>

    <div id="historySection" class="border-t border-gray-200 dark:border-gray-800">
      <div class="flex items-center gap-2 px-3 py-1">
        <button id="historyToggle" class="text-[9px] text-gray-400 uppercase font-medium shrink-0 flex items-center gap-1 hover:text-gray-600">
          <span id="historyArrow">▶</span> history <span id="historyCount"></span>
        </button>
        <input type="text" id="historySearch" class="flex-1 h-5 px-1.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-sm text-[9px] outline-none hidden" placeholder="search blockreferences">
        <button id="clearHistoryBtn" class="text-[9px] text-gray-400 hover:text-red-500 hidden shrink-0">clear</button>
      </div>
      <div id="historyContent" class="hidden">
        <div id="historyList"></div>
        <div id="historyEmpty" class="px-3 pb-2 hidden">
          <span class="text-[9px] text-gray-400">no clips yet</span>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"><span id="toastMessage"></span></div>
</div>

<script src="popup.js" type="module"></script>

</body>
</html>
